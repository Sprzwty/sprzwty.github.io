name: Sync Notion Posts

on:
  workflow_dispatch:
  schedule:
    # Every 6 hours (UTC). Adjust as needed.
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync Notion database to _posts/notion/
        id: sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          if [ -z "$NOTION_TOKEN" ] || [ -z "$NOTION_DATABASE_ID" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "NOTION secrets not configured; skipping sync."
            exit 0
          fi
          npm run notion:sync
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: steps.sync.outputs.skipped != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts/notion/
          if git diff --staged --quiet; then
            echo "No Notion post changes."
            exit 0
          fi
          git commit -m "chore(content): sync posts from Notion"
          git push
