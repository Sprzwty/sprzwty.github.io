# =====================================================================
# Site: sprzwty.github.io
# Built on jekyll-theme-H2O-ac  v1.2.1
# =====================================================================

# ---------------------
# Site settings
# ---------------------
title: 'Mr. WANG'
description: 'Technics, Experiences, Solutions, Interesting Things.'
keyword: 'Sprzwty, Blog of Sprzwty, Python, KRR, ML'
url: 'https://sprzwty.github.io'

# Leave blank for username.github.io repos (no subdirectory)
baseurl: ''

# ---------------------
# Internationalization
# ---------------------
languages: ["zh-Hans", "en"]
default_lang: "zh-Hans"
# Removed: zh-Hant, ja (no content or locale files)

# ---------------------
# GitHub integration
# ---------------------
github:
  enabled: true
  owner: sprzwty
  repository: sprzwty.github.io

# ---------------------
# PWA
# ---------------------
pwa:
  color: '#5A80AA'
  short_name: 'Sprzwty'

# ---------------------
# Navigation
# ---------------------
nav:
  home: '/'
  blog: '/blog/index.html'
  archives: '/archives.html'
  tags: '/tags.html'
  about:
    logs: '/logs.html'
    tos: '/tos.html'
    RSS: '/feed.xml'
    CV: '/cv.html'
    links: '/links.html'

# ---------------------
# Appearance
# ---------------------
gray: false
nightMode: false
theme-color: 'default'    # 'default' or 'pink'
postPatterns: 'circuitBoard'

# ---------------------
# Time format
# 0 -- 2022-04-29   1 -- 29 Apr 2022   2 -- 2022年4月29日
# ---------------------
formats:
  time: 0

# ---------------------
# Favicon
# ---------------------
favicon: "/favicon.ico"

# ---------------------
# Footer
# ---------------------
footer:
  since: 2022

# ---------------------
# Author
# ---------------------
author: 'Wang Tongyu'
nickname: 'Wang Tongyu'
bio: 'Master student, AI lover, Dream to be an engineer'
avatar: '/assets/img/profile.webp'

# ---------------------
# Features
# ---------------------
search: true
mathjax: true
toc: true
mermaid: true
cclicense: true

# ---------------------
# Social share
# ---------------------
social-share: true
social-share-items: ['twitter']

# ---------------------
# SNS links (fill in your own, delete unused ones)
# ---------------------
sns:
  github: 'https://github.com/sprzwty'
  # linkedin: 'https://www.linkedin.com/in/yourprofile'
  # google-scholar: 'https://scholar.google.com/citations?user=YOURID'
  # ORCID: 'https://orcid.org/0000-0000-0000-0000'
  # twitter: 'https://twitter.com/yourhandle'

# ---------------------
# Comments
# Both disabled — set up your own service first:
#   Waline: https://waline.js.org  (Vercel / Railway)
#   Disqus: https://disqus.com
# ---------------------
comments:
  disqus: false
  disqus_url: ''
  waline: false
  waline_url: ''
  waline_reaction: false
  waline_locale:

# ---------------------
# Analytics
# ---------------------
busuanzi: true
cnzz:
google_analytics:
umami:
  status:
  id:
  js:

# ---------------------
# SEO
# ---------------------
google_search:

# ---------------------
# Tags sidebar
# ---------------------
recommend-tags: true
recommend-condition-size: 12

# ---------------------
# Links page / Sponsors
# ---------------------
links:
supports:
  upyun:
  webify:

# ---------------------
# Optional features
# ---------------------
beian:
tos: /tos.html
foreverblog: false
wormhole: false
notbyAI: true
webpusher: false
alivetime: false
alivestart: ""

# ---------------------
# Build settings
# ---------------------
pagination:
  enabled: true
  per_page: 5
  permalink: 'page:num/'
  title: ':title | :num of :max'
  limit: 0
  sort_field: 'date'
  sort_reverse: true

exclude:
  - node_modules
  - dev
  - dist
  - package.json
  - package-lock.json
  - webpack.config.js
  - .gitignore
  - README.md
  - Gemfile
  - Gemfile.lock
  - LICENSE

# ---------------------
# Markdown
# ---------------------
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM

# ---------------------
# Prism code highlighting
# Themes: https://prismjs.com  https://github.com/PrismJS/prism-themes
# ---------------------
prism:
  theme: one-light
  line_numbers: true

# ---------------------
# RSS feed
# ---------------------
RSS: true

# ---------------------
# Permalink
# ---------------------
permalink: /:categories/:title.html

# ---------------------
# External links (open in new tab, nofollow)
# ---------------------
extlinks:
  attributes: {rel: nofollow, target: _blank, class: extlinks}

# ---------------------
# Premonition callout boxes
# ---------------------
premonition:
  default:
    template: '<div class="premonition {{type}}">
          <div class="header">
            <svg class="icon {{type}}" aria-hidden="true">
                <use xlink:href="#icon-{{type}}"></use>
            </svg>
            <div class="title"> {{title}} </div>
          </div>
          <div class="content">
            {{content}}
          </div>
        </div>'
  types:
    citation:
      template: '<div class="premonition {{type}}">
          <div class="header">
            <svg class="icon {{type}}" aria-hidden="true">
                <use xlink:href="#icon-{{type}}"></use>
            </svg>
          </div>
          <div class="content">
            {{content}}
          </div>
          {% if title %}<div class="ref"> ------ {{title}} </div>{% endif %}
        </div>'
      default_title: ''
    note:
      default_title: 'Note'
    info:
      default_title: 'Info'
    warning:
      default_title: 'Warning'
    error:
      default_title: 'Error'

# ---------------------
# Plugins
# ---------------------
plugins:
  - jekyll-paginate-v2
  - jekyll-feed
  - jekyll-sitemap
  - premonition
  - h2o-ac-jekyll-extlinks
